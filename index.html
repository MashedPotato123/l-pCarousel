<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Carousel About Us</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="carousel-container">
  <div class="carousel" id="carousel">
    <div class="carousel-item" data-index="0">
      <img src="1.jpg" alt="Image 1">
      <div class="item-text">
        <h2>Kyla Taylor</h2>
        <p>CEO | Business Growth Strategy, & Stakeholder Relations</p>
      </div>
    </div>

    <div class="carousel-item" data-index="1">
      <img src="5.jpg" alt="Image 5">
      <div class="item-text">
        <h2>Manu Jha</h2>
        <p>Growth Strategy and Product Marketing</p>
      </div>
    </div>

    <div class="carousel-item" data-index="2">
      <img src="6.jpg" alt="Image 6">
      <div class="item-text">
        <h2>Pawlo Pascual, RGD</h2>
        <p>Creative & Design Team Lead</p>
      </div>
    </div>

    <div class="carousel-item" data-index="3">
      <img src="8.jpg" alt="Image 8">
      <div class="item-text">
        <h2>J.P. Borchardt​</h2>
        <p>Producer, Director, Videographer & Editor</p>
      </div>
    </div>
  </div>
</div>

<div id="popup-modal" class="modal-container">
  <div class="modal-content">
    <span class="modal-close-btn">&times;</span>
    <img id="modal-img" src="" alt="Profile Image">
    <div id="modal-text" class="modal-text-content">
      <h2 id="modal-name"></h2>
      <p id="modal-position"></p>
      <p id="modal-bio"></p>
      <br>
      <p id="modal-bio-header"></p>
      <p id="modal-bio-2"></p>
    </div>
  </div>
</div>

<script src="scripts.js"></script>
</body>
</html>
